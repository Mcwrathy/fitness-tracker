<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="PWA fitness tracker with adaptive targets and medical safety guardrails for Dan's cardioprotection protocol.">
  <meta name="theme-color" content="#1a1a1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Fitness">

  <title>Fitness Tracker</title>

  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app"></div>

  <!-- Scripts (in order) -->
  <script src="js/storage.js"></script>
  <script src="js/adaptive.js"></script>
  <script src="js/library.js"></script>
  <script src="js/ai-hook.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/screens/welcome.js"></script>
  <script src="js/screens/today.js"></script>
  <script src="js/screens/history.js"></script>
  <script src="js/screens/plan.js"></script>
  <script src="js/main.js"></script>

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Install banner (simple, on first visit) -->
  <script>
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      showInstallBanner();
    });

    function showInstallBanner() {
      const banner = document.createElement('div');
      banner.style.cssText = `
        position: fixed;
        top: 16px;
        left: 16px;
        right: 16px;
        background: #2dd4bf;
        color: #1a1a1a;
        padding: 1rem;
        border-radius: 8px;
        z-index: 1001;
        font-weight: 600;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      `;
      banner.innerHTML = `
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <span>Install as app?</span>
          <div style="display: flex; gap: 0.5rem;">
            <button
              id="install-yes"
              style="
                background: #1a1a1a;
                color: #2dd4bf;
                border: none;
                padding: 0.5rem 1rem;
                border-radius: 4px;
                cursor: pointer;
                font-weight: 600;
              "
            >Yes</button>
            <button
              id="install-no"
              style="
                background: transparent;
                color: #1a1a1a;
                border: none;
                cursor: pointer;
                font-weight: 600;
              "
            >Later</button>
          </div>
        </div>
      `;
      document.body.appendChild(banner);

      document.getElementById('install-yes').onclick = () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          deferredPrompt.userChoice.then(() => {
            banner.remove();
            deferredPrompt = null;
          });
        }
      };

      document.getElementById('install-no').onclick = () => {
        banner.remove();
      };

      setTimeout(() => {
        if (banner.parentNode) banner.remove();
      }, 5000);
    }
  </script>
</body>
</html>
